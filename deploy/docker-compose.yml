name: twenty

# The Rift variant of upstream twenty docker-compose:
#   - no `db` service (DigitalOcean Managed Postgres, wired via PG_DATABASE_URL in .env)
#   - redis stays a local container
#   - caddy added for reverse-proxy + (once a domain is mounted) automatic HTTPS
#   - server/worker images pulled from DOCR, built by the fork's CI
# Runtime config comes from a sibling `.env` (never committed; see .env.example).

services:
  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      server:
        condition: service_healthy

  server:
    image: registry.digitalocean.com/totssy/twenty:${TAG:-prod}
    restart: always
    env_file: .env
    environment:
      NODE_PORT: 3000
    volumes:
      # Used when STORAGE_TYPE=local (v1). Shared with worker. Harmless under s3.
      - server-local-data:/app/packages/twenty-server/.local-storage
    healthcheck:
      test: curl --fail http://localhost:3000/healthz
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: registry.digitalocean.com/totssy/twenty:${TAG:-prod}
    restart: always
    command: ["yarn", "worker:prod"]
    env_file: .env
    environment:
      # migrations + cron run on the server, not the worker
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    depends_on:
      server:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7
    restart: always
    command: ["--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  caddy-data:
  caddy-config:
  server-local-data:
