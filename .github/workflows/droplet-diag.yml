name: droplet-diag

# One-shot diagnostics: dump container state + email-related logs from the
# droplet (run from a GitHub runner so it works when operator SSH is blocked).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 8m
          script: |
            cd /opt/the-rift/twenty
            echo "===== PS ====="; docker compose ps
            echo "===== EMAIL CONFIG (masked) ====="; sed -E 's/(PASSWORD=).*/\1****/' .env | grep '^EMAIL_'
            echo "===== WORKER: email/smtp/error lines (last 80) ====="
            docker compose logs worker --tail 1200 2>&1 | grep -iE "email|smtp|mail|nodemailer|invit|resend|workspaceMember|EAUTH|ECONN|ETIMEDOUT|EENVELOPE|535|421|454|TLS|cert|self-signed|sender|getaddrinfo|from |error|exception|fail|reject" | tail -80
            echo "===== WORKER: raw tail 60 ====="
            docker compose logs worker --tail 60 2>&1 | tail -60
            echo "===== SERVER: email/smtp lines (last 40) ====="
            docker compose logs server --tail 600 2>&1 | grep -iE "email|smtp|nodemailer|invit|resend|EAUTH|ECONN|ETIMEDOUT|535|421|TLS|self-signed|sender|from address|error.*mail|mail.*error" | tail -40
